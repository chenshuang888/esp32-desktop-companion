<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Menu v2 — 状态栏 + 九宫格 + 翻页</title>
<link rel="stylesheet" href="../_shared/tokens.css">
<link rel="stylesheet" href="../_shared/frame.css">
<style>
  /* ============================================================================
   * v2 设计：状态栏(24px) + 九宫格主体 + 分页指示
   *
   * 状态栏分三段：
   *   左：时间 14:32
   *   中：蓝牙图标（连接=蓝色实心 / 未连接=灰色描边）
   *   右：电池图标 + 87%
   *
   * 九宫格：
   *   3×3 = 单元格 80×88 (含 16px 文字)，图标占 56×56
   *   每页 9 个，>9 翻第二页
   *
   * 分页指示：● ○ 8px 圆点
   *
   * 图标：mockup 阶段先用 emoji 占位，方便看比例
   *       LVGL 实施时换成 Material Symbols 子集字体
   * ========================================================================= */

  .screen { padding: 0; display: flex; flex-direction: column; }

  /* ---- 状态栏 ---- */
  .statusbar {
    height: 24px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 var(--sp-md);
    border-bottom: 1px solid rgba(198,198,200,0.5);
    font-size: 12px;
    color: var(--text-dim);
    gap: var(--sp-md);
  }
  .statusbar .time {
    flex: 1;            /* 左侧 + 占满中段空白 */
  }
  .statusbar .right {
    display: flex;
    gap: var(--sp-md);
    align-items: center;
  }
  .statusbar .bt-on  { color: var(--accent); }
  .statusbar .bt-off { color: var(--text-muted); }
  .statusbar .battery {
    display: flex;
    gap: var(--sp-xs);
    align-items: center;
  }
  .statusbar .battery .pct { color: var(--text); font-weight: 600; }
  .statusbar .battery .icon { color: var(--ok); font-size: 14px; }
  .statusbar .battery.low  .icon { color: var(--warn); }
  .statusbar .battery.crit .icon { color: var(--err); }

  /* ---- 主体区：九宫格 ---- */
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: var(--sp-sm);
    gap: 0;
  }
  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--sp-xs);
    border-radius: var(--r-md);
    cursor: pointer;
    user-select: none;
  }
  .cell .icon {
    font-size: 36px;
    line-height: 1;
    color: var(--text);
  }
  .cell .label {
    font-size: var(--f-body);
    color: var(--text);
  }

  /* 各 app 的强调色（图标颜色）——参考苹果设置图标的一图一色 */
  .cell.bt       .icon { color: var(--accent); }
  .cell.weather  .icon { color: var(--w-clear); }
  .cell.notify   .icon { color: var(--err); }
  .cell.music    .icon { color: var(--accent-2); }
  .cell.system   .icon { color: var(--text-dim); }
  .cell.brightness .icon { color: var(--warn); }
  .cell.time     .icon { color: var(--info); }
  .cell.about    .icon { color: var(--text-muted); }
  .cell.dynapp   .icon { color: var(--ok); }

  /* ---- 分页指示 ---- */
  .dots {
    height: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.active {
    background: var(--text);
  }
</style>
</head>
<body>

<div class="stages-row">

  <!-- 第一页：核心 9 个 -->
  <div class="stage">
    <div class="meta">v2 · page 1 / 2 · 240×320</div>
    <div class="screen">
      <div class="statusbar">
        <span class="time">14:32</span>
        <span class="right">
          <span class="bt-on">⌬</span>
          <span class="battery">
            <span class="icon">▮</span>
            <span class="pct">87%</span>
          </span>
        </span>
      </div>

      <div class="grid">
        <div class="cell time"><span class="icon">⏰</span><span class="label">时钟</span></div>
        <div class="cell weather"><span class="icon">☀</span><span class="label">天气</span></div>
        <div class="cell notify"><span class="icon">🔔</span><span class="label">通知</span></div>

        <div class="cell music"><span class="icon">♬</span><span class="label">音乐</span></div>
        <div class="cell system"><span class="icon">⚙</span><span class="label">系统</span></div>
        <div class="cell bt"><span class="icon">⌬</span><span class="label">蓝牙</span></div>

        <div class="cell brightness"><span class="icon">☀</span><span class="label">亮度</span></div>
        <div class="cell about"><span class="icon">ⓘ</span><span class="label">关于</span></div>
        <div class="cell dynapp"><span class="icon">▣</span><span class="label">仪表盘</span></div>
      </div>

      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- 第二页：剩余动态 app -->
  <div class="stage">
    <div class="meta">v2 · page 2 / 2 · 240×320</div>
    <div class="screen">
      <div class="statusbar">
        <span class="time">14:32</span>
        <span class="right">
          <span class="bt-off">⌬</span>
          <span class="battery low">
            <span class="icon">▮</span>
            <span class="pct">23%</span>
          </span>
        </span>
      </div>

      <div class="grid">
        <div class="cell dynapp"><span class="icon">⏱</span><span class="label">闹钟</span></div>
        <div class="cell dynapp"><span class="icon">▦</span><span class="label">2048</span></div>
        <div class="cell dynapp"><span class="icon">📝</span><span class="label">便签</span></div>

        <div class="cell dynapp"><span class="icon">🐟</span><span class="label">鱼缸</span></div>
        <div class="cell dynapp"><span class="icon">⏲</span><span class="label">计时</span></div>
        <div class="cell dynapp"><span class="icon">🧠</span><span class="label">记忆</span></div>

        <div class="cell dynapp"><span class="icon">🐹</span><span class="label">打地鼠</span></div>
        <div class="cell dynapp"><span class="icon">⚡</span><span class="label">反应</span></div>
        <div class="cell dynapp"><span class="icon">🎯</span><span class="label">习惯</span></div>
      </div>

      <div class="dots">
        <span class="dot"></span>
        <span class="dot active"></span>
      </div>
    </div>
  </div>

</div>

<div class="toolbar">
  <button id="btn-grid">Toggle 8px Grid</button>
  <button id="btn-info">Toggle Sizes</button>
</div>
<script>
  document.getElementById('btn-grid').onclick = function(){
    document.body.classList.toggle('show-grid');
    this.classList.toggle('on');
  };
  document.getElementById('btn-info').onclick = function(){
    document.body.classList.toggle('show-info');
    this.classList.toggle('on');
    if (document.body.classList.contains('show-info')) {
      document.querySelectorAll('.screen [class]').forEach(el => {
        const r = el.getBoundingClientRect();
        el.dataset.size = `${Math.round(r.width/2)}×${Math.round(r.height/2)}`;
      });
    }
  };
</script>
<style>
  body.show-info .screen [class]::after {
    content: attr(data-size);
    position: absolute;
    top: 0; right: 2px;
    font-size: 5px;
    color: var(--accent);
    font-family: ui-monospace, monospace;
    background: rgba(255,255,255,0.85);
    padding: 1px 2px;
    border-radius: 2px;
    pointer-events: none;
  }
</style>
</body>
</html>
